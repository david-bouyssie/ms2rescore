name: Build Windows CLI bundle

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  windows-cli:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install package and dependencies
        run: uv sync --group installer

      - name: Run pyinstaller (CLI spec)
        run: uv run pyinstaller ./ms2rescore_cli.spec --clean --noconfirm

      # Sanity check: the bundled exe must actually expose the CLI.
      # --help exits 0 and prints usage; this fails the build if the
      # wrong entry point (e.g. the windowed GUI) was packaged.
      - name: Test built CLI exe
        run: dist/ms2rescore-cli/ms2rescore-cli.exe --help

      - name: Zip the CLI bundle
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if ([string]::IsNullOrEmpty($version)) { $version = "dev" }
          $zipName = "MS2Rescore-CLI-$version-Windows64bit.zip"
          Compress-Archive -Path dist/ms2rescore-cli/* -DestinationPath dist/$zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ms2rescore-cli-windows
          path: dist/*.zip

      - name: Upload CLI bundle to release
        if: github.event_name == 'release'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref }}
          file_glob: true
          file: dist/*.zip
